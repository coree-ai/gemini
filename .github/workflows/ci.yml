name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  coree-version:
    uses: coree-ai/.github/.github/workflows/coree-version-check.yml@main

  biome:
    name: Biome (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Biome CI
        run: npx @biomejs/biome ci

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Validate Extension
        run: gemini extension validate .
